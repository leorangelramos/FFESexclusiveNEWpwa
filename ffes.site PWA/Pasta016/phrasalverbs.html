            color: #000;
            border: none;

            padding: 15px;

        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let currentCorrectOption = '';
        let totalXP = 0;

        const elProgressText = document.getElementById('progressText');
        const elScoreText = document.getElementById('scoreText');
        const elPvDisplay = document.getElementById('pvDisplay');
        const elTextA = document.getElementById('textA');
        const elTextB = document.getElementById('textB');
        const elBtnA = document.getElementById('btnA');
        const elBtnB = document.getElementById('btnB');
        const elNextBtn = document.getElementById('nextBtn');
        const elGameScreen = document.getElementById('gameScreen');
        const elEndScreen = document.getElementById('endScreen');
        const elFinalScoreText = document.getElementById('finalScoreText');
        const elXpVal = document.getElementById('xp-val');

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initGame() {
            // Carrega o XP salvo no navegador, se existir
            if (localStorage.getItem('userXP')) {
                totalXP = parseInt(localStorage.getItem('userXP'));
            }
            elXpVal.innerText = totalXP;

            shuffledQuestions = shuffleArray(phrasalVerbsData);
            currentIndex = 0;
            score = 0;
            
            elGameScreen.style.display = 'block';
            elEndScreen.style.display = 'none';
            elScoreText.innerText = score;
            
            loadQuestion();
        }

        function loadQuestion() {
            resetButtons();
            const currentQ = shuffledQuestions[currentIndex];
            elProgressText.innerText = `Questão ${currentIndex + 1} / ${shuffledQuestions.length}`;
            elPvDisplay.innerText = currentQ.verb;

            // Lógica para sortear uma resposta incorreta do próprio banco
            let wrongMeaning = "";
            let randomIdx = 0;
            do {
                randomIdx = Math.floor(Math.random() * phrasalVerbsData.length);
                wrongMeaning = phrasalVerbsData[randomIdx].meaning;
            } while (wrongMeaning === currentQ.meaning);

            const isACorrect = Math.random() < 0.5;
            
            if (isACorrect) {
                elTextA.innerText = currentQ.meaning;
                elTextB.innerText = wrongMeaning;
                currentCorrectOption = 'A';
            } else {
                elTextA.innerText = wrongMeaning;
                elTextB.innerText = currentQ.meaning;
                currentCorrectOption = 'B';
            }
        }

        function checkAnswer(selectedOption) {
            elBtnA.disabled = true;
            elBtnB.disabled = true;

            const isCorrect = (selectedOption === currentCorrectOption);

            if (isCorrect) {
                score++;
                elScoreText.innerText = score;
                
                // Lógica do XP
                totalXP += 10;
                localStorage.setItem('userXP', totalXP);
                elXpVal.innerText = totalXP;

                document.getElementById('btn' + selectedOption).classList.add('correct');
            } else {
                document.getElementById('btn' + selectedOption).classList.add('wrong');
                document.getElementById('btn' + currentCorrectOption).classList.add('correct');
            }

            elNextBtn.style.display = 'block';
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < shuffledQuestions.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function resetButtons() {
            elBtnA.disabled = false;
            elBtnB.disabled = false;
            elBtnA.className = 'option-btn';
            elBtnB.className = 'option-btn';
            elNextBtn.style.display = 'none';
        }

        function showEndScreen() {
            elGameScreen.style.display = 'none';
            elEndScreen.style.display = 'block';
            elFinalScoreText.innerText = `Você acertou ${score} de ${shuffledQuestions.length}.`;
        }

        function restartGame() {
            initGame();
        }

        window.onload = initGame;
    </script>
